<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            /* 严格限制调色板 - 16-bit RPG Style */
            --c-brown: #8B5A2B;      /* 木质/边框 */
            --c-green: #5E8C31;      /* 草地/成功 */
            --c-blue: #7EC0EE;       /* 天空/信息 */
            --c-wheat: #D8A03D;      /* 高亮/选中 */
            --c-orange: #E07A2F;     /* 强调/警告 */
            --c-beige: #F4E4BC;      /* 纸张/背景 */
            --c-dark: #3E2723;       /* 文字 (代替纯黑) */
            --c-light: #FFF8E1;      /* 高光 (代替纯白) */
            
            /* 场景特定颜色 */
            --c-night-sky: #1a1025;
            --c-wood-floor: #5d4037;
            --c-candle-light: rgba(255, 200, 100, 0.15);
            --c-autumn-sky-top: #ff9a56;
            --c-autumn-sky-bot: #5d4037;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'VT323', monospace;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: var(--c-dark);
            transition: background 1s ease;
        }

        /* 
           场景 1: 木屋室内 (测试页背景)
           Prompt: 16-bit pixel art wooden cottage interior, warm candle light...
        */
        .bg-cottage {
            background-color: var(--c-wood-floor);
            /* 模拟木地板 */
            background-image: 
                repeating-linear-gradient(90deg, transparent 0, transparent 39px, rgba(0,0,0,0.2) 40px),
                linear-gradient(180deg, var(--c-wood-floor) 0%, #3e2723 100%);
            background-size: 100% 100%, 100% 100%;
            position: relative;
        }

        /* 木屋内的窗户 (夜空) */
        .bg-cottage::before {
            content: '';
            position: absolute;
            top: 10%;
            right: 10%;
            width: 150px;
            height: 150px;
            background: var(--c-night-sky);
            border: 8px solid #3e2723;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
            /* 模拟窗外的星星 */
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 1px, transparent 2px),
                radial-gradient(white, rgba(255,255,255,.2) 1px, transparent 2px);
            background-size: 30px 30px, 50px 50px;
            background-position: 0 0, 20px 20px;
            z-index: -2;
            opacity: 0.8;
        }

        /* 木屋内的烛光 (中心暖光) */
        .bg-cottage::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120%;
            height: 120%;
            background: radial-gradient(circle, var(--c-candle-light) 0%, transparent 60%);
            z-index: -1;
            pointer-events: none;
        }

        /* 
           场景 2: 秋日丰收 (结果页背景)
           Prompt: 16-bit pixel art autumn harvest farm scene, golden crops...
        */
        .bg-harvest {
            background: linear-gradient(180deg, var(--c-autumn-sky-top) 0%, var(--c-autumn-sky-bot) 100%);
            position: relative;
        }

        /* 远处的树林剪影 */
        .bg-harvest::before {
            content: '';
            position: absolute;
            bottom: 30%;
            left: 0;
            width: 100%;
            height: 100px;
            background-image: 
                radial-gradient(circle at 50% 100%, #5d4037 20px, transparent 21px),
                radial-gradient(circle at 50% 100%, #5d4037 20px, transparent 21px),
                radial-gradient(circle at 50% 100%, #5d4037 20px, transparent 21px);
            background-size: 60px 60px;
            background-position: 0 0, 30px 0, 15px 0;
            opacity: 0.6;
            z-index: -2;
        }

        /* 近处的金色作物 */
        .bg-harvest::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40%;
            background-image: 
                repeating-linear-gradient(90deg, 
                    transparent 0, 
                    transparent 10px, 
                    rgba(216, 160, 61, 0.4) 11px, 
                    rgba(216, 160, 61, 0.4) 14px
                );
            z-index: -1;
        }

        /* 飘落的像素叶子 (动画) */
        .falling-leaf {
            position: absolute;
            width: 6px;
            height: 6px;
            background: var(--c-wheat);
            top: -10px;
            animation: fall linear infinite;
            z-index: 0;
            opacity: 0.7;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }

        /* CRT 扫描线效果 overlay */
        .scanlines {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 999;
            opacity: 0.6;
        }

        /* 主游戏窗口容器 */
        .game-boy {
            width: 100%;
            max-width: 640px;
            height: 85vh;
            max-height: 800px;
            background: rgba(244, 228, 188, 0.95); /* 高不透明度以确保文字可读 */
            border: 8px solid var(--c-brown);
            border-radius: 4px;
            box-shadow: 
                0 0 0 4px var(--c-dark),
                20px 20px 0px rgba(0,0,0,0.5),
                inset 0 0 60px rgba(62, 39, 35, 0.3);
            display: flex;
            flex-direction: column;
            padding: 20px;
            position: relative;
            z-index: 10;
            backdrop-filter: blur(1px);
            transition: transform 0.3s ease;
        }

        /* 顶部状态栏 */
        .status-bar {
            background: var(--c-beige);
            border: 4px solid var(--c-dark);
            padding: 8px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.2);
            image-rendering: pixelated;
        }

        .player-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .pixel-avatar {
            width: 36px;
            height: 36px;
            background: var(--c-orange);
            border: 3px solid var(--c-dark);
            box-shadow: inset -2px -2px 0px rgba(0,0,0,0.3);
        }

        .level-badge {
            background: var(--c-blue);
            color: var(--c-dark);
            padding: 2px 10px;
            border: 2px solid var(--c-dark);
            font-size: 1.4rem;
            box-shadow: 2px 2px 0px rgba(0,0,0,0.2);
            text-transform: uppercase;
        }

        /* 主内容区域 */
        .dialogue-box {
            flex: 1;
            background: var(--c-beige);
            border: 4px solid var(--c-dark);
            padding: 25px;
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: inset 6px 6px 0px rgba(62, 39, 35, 0.1);
            overflow-y: auto;
        }

        .dialogue-box::-webkit-scrollbar {
            width: 14px;
            background: var(--c-brown);
            border-left: 2px solid var(--c-dark);
        }
        .dialogue-box::-webkit-scrollbar-thumb {
            background: var(--c-orange);
            border: 2px solid var(--c-dark);
        }

        .quest-title {
            font-size: 2rem;
            color: var(--c-orange);
            text-shadow: 2px 2px 0px var(--c-brown);
            margin-bottom: 20px;
            border-bottom: 4px double var(--c-brown);
            padding-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .question-text {
            font-size: 1.8rem;
            line-height: 1.4;
            margin-bottom: 25px;
            color: var(--c-dark);
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .wood-btn {
            background: var(--c-brown);
            color: var(--c-light);
            border: 4px solid var(--c-dark);
            padding: 14px 20px;
            font-family: 'VT323', monospace;
            font-size: 1.5rem;
            cursor: pointer;
            text-align: left;
            position: relative;
            transition: all 0.1s;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.4);
            text-transform: uppercase;
        }

        .wood-btn:hover {
            background: var(--c-wheat);
            color: var(--c-dark);
            transform: translate(-3px, -3px);
            box-shadow: 7px 7px 0px rgba(0,0,0,0.4);
        }

        .wood-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0px rgba(0,0,0,0.4);
        }

        .progress-container {
            margin-top: auto;
            padding-top: 25px;
            border-top: 2px dashed var(--c-brown);
        }
        .progress-label {
            font-size: 1.3rem;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            color: var(--c-brown);
            font-weight: bold;
        }
        .progress-track {
            height: 18px;
            background: var(--c-dark);
            border: 2px solid var(--c-light);
            padding: 2px;
        }
        .progress-fill {
            height: 100%;
            background: var(--c-green);
            width: 0%;
            transition: width 0.4s steps(10); 
            box-shadow: inset -2px 0 0 rgba(0,0,0,0.3);
        }

        /* 结果页面 */
        .result-card {
            text-align: center;
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .pixel-result-type {
            font-size: 6rem;
            color: var(--c-orange);
            text-shadow: 5px 5px 0px var(--c-brown);
            line-height: 1;
            margin: 20px 0;
            font-weight: bold;
        }

        .pixel-result-name {
            font-size: 2.2rem;
            color: var(--c-light);
            background: var(--c-blue);
            display: inline-block;
            padding: 8px 20px;
            margin-bottom: 25px;
            border: 3px solid var(--c-dark);
            box-shadow: 4px 4px 0px rgba(0,0,0,0.3);
        }

        .pixel-desc {
            font-size: 1.5rem;
            text-align: left;
            background: rgba(139, 90, 43, 0.1);
            padding: 20px;
            border: 3px dashed var(--c-brown);
            line-height: 1.5;
        }

        .save-slot {
            position: absolute;
            top: 15px;
            right: 15px;
            background: var(--c-blue);
            color: var(--c-dark);
            padding: 5px 12px;
            border: 2px solid var(--c-dark);
            font-size: 1.1rem;
            cursor: pointer;
            z-index: 10;
            box-shadow: 2px 2px 0px rgba(0,0,0,0.3);
            font-family: 'VT323', monospace;
        }
        .save-slot:hover {
            background: var(--c-wheat);
            transform: translateY(-2px);
        }

        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @media (max-width: 480px) {
            .game-boy { height: 95vh; padding: 10px; }
            .quest-title { font-size: 1.6rem; }
            .question-text { font-size: 1.4rem; }
            .wood-btn { font-size: 1.3rem; padding: 12px; }
            .pixel-result-type { font-size: 4rem; }
            .status-bar { padding: 5px 10px; }
        }
    </style>
</head>

    let state = {
        qIndex: 0,
        scores: { E:0, I:0, S:0, N:0, T:0, F:0, J:0, P:0 },
        finished: false
    };

    const screen = document.getElementById('main-screen');
    const saveBtn = document.getElementById('save-slot-btn');
    const body = document.body;

    // 初始化
    function init() {
        const saved = localStorage.getItem('rpg_mbti_save');
        if (saved) {
            saveBtn.style.display = 'block';
        }
        renderQuestion();
    }

    function renderQuestion() {
        if (state.qIndex >= questions.length) {
            finishGame();
            return;
        }

        const q = questions[state.qIndex];
        const progress = ((state.qIndex) / questions.length) * 100;

        let html = `
            <div class="quest-title">Quest ${state.qIndex + 1}/20</div>
            <div class="question-text">"${q.text}"</div>
            <div class="options-list">
                ${q.opts.map((opt, i) => `
                    <button class="wood-btn" onclick="handleChoice(${opt.s}, '${q.dim}')">
                        > ${opt.t}
                    </button>
                `).join('')}
            </div>
            <div class="progress-container">
                <div class="progress-label">
                    <span>QUEST PROG.</span>
                    <span>${Math.floor(progress)}%</span>
                </div>
                <div class="progress-track">
                    <div class="progress-fill" style="width: ${progress}%"></div>
                </div>
            </div>
        `;
        screen.innerHTML = html;
    }

    function handleChoice(score, dim) {
        if (dim === 'EI') score > 0 ? state.scores.E++ : state.scores.I++;
        if (dim === 'SN') score > 0 ? state.scores.S++ : state.scores.N++;
        if (dim === 'TF') score > 0 ? state.scores.T++ : state.scores.F++;
        if (dim === 'JP') score > 0 ? state.scores.J++ : state.scores.P++;

        state.qIndex++;
        saveGame();
        renderQuestion();
    }

    function finishGame() {
        state.finished = true;
        saveGame();

        const type = 
            (state.scores.E >= state.scores.I ? 'E' : 'I') +
            (state.scores.S >= state.scores.N ? 'S' : 'N') +
            (state.scores.T >= state.scores.F ? 'T' : 'F') +
            (state.scores.J >= state.scores.P ? 'J' : 'P');
        
        const data = mbtiData[type];

        // 切换背景到丰收场景
        body.className = 'bg-harvest';
        createFallingLeaves();

        let html = `
            <div class="result-card">
                <div style="font-size: 3rem; color: var(--c-wheat);">🏆 QUEST CLEAR!</div>
                <div class="pixel-result-type">${type}</div>
                <div class="pixel-result-name">${data.name}</div>
                <div class="pixel-desc">
                    ${data.desc}
                </div>
                <br>
                <button class="wood-btn" style="width:100%; text-align:center;" onclick="resetGame()">
                    🔄 NEW GAME +
                </button>
            </div>
        `;
        screen.innerHTML = html;
    }

    // 创建飘落的叶子动画
    function createFallingLeaves() {
        // 清除旧的叶子
        document.querySelectorAll('.falling-leaf').forEach(e => e.remove());
        
        for(let i=0; i<15; i++) {
            const leaf = document.createElement('div');
            leaf.className = 'falling-leaf';
            leaf.style.left = Math.random() * 100 + 'vw';
            leaf.style.animationDuration = (Math.random() * 3 + 2) + 's';
            leaf.style.animationDelay = (Math.random() * 2) + 's';
            // 随机颜色：黄色或橙色
            leaf.style.background = Math.random() > 0.5 ? 'var(--c-wheat)' : 'var(--c-orange)';
            document.body.appendChild(leaf);
        }
    }

    function saveGame() {
        localStorage.setItem('rpg_mbti_save', JSON.stringify(state));
    }

    function loadSavedGame() {
        const saved = localStorage.getItem('rpg_mbti_save');
        if (saved) {
            state = JSON.parse(saved);
            if (state.finished) {
                finishGame();
            } else {
                renderQuestion();
            }
        }
    }

    function resetGame() {
        localStorage.removeItem('rpg_mbti_save');
        state = { qIndex: 0, scores: { E:0, I:0, S:0, N:0, T:0, F:0, J:0, P:0 }, finished: false };
        saveBtn.style.display = 'none';
        
        // 切换回木屋背景
        body.className = 'bg-cottage';
        document.querySelectorAll('.falling-leaf').forEach(e => e.remove());
        
        renderQuestion();
    }

    init();
</script>
</body>
</html>
